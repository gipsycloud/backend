services:
  db:
    image: postgres:16-alpine
    container_name: clean_structure_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clean_structure_db
    ports:
      - "5438:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
volumes:
  db_data: